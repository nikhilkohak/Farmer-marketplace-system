<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Farmer Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
             background: url("{{ url_for('static', filename='img3.jpg') }}")
              no-repeat center center/cover;
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        header {
            background: #27ae60;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 40px auto;
             background: rgba(255, 255, 255, 0.2);  /* transparent white */
  backdrop-filter: blur(10px);           /* blur effect */
  -webkit-backdrop-filter: blur(10px);

        }

        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: #2c3e50;
        }

        .actions {
            margin-top: 25px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
        }

        .btn-primary {
            background: #27ae60;
            color: white;
        }

        .btn-primary:hover {
            background: #219150;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        @media (max-width: 600px) {
            .btn {
                display: block;
                width: 100%;
            }
        }
    </style>
</head>

<body>



<div class="container">

    <div class="card">
        <h1>Welcome {{ name }} 👨‍🌾</h1>

        <div class="actions">
            <a href="{{ url_for('search_crop') }}" class="btn btn-primary">
                Search Crop Price
            </a>
            

            <a href="/login" class="btn btn-danger">
                Logout
            </a>
        </div>
    </div>

</div>

</body>
</html>
