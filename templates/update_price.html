<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Update Price</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#eef2f7,#dbeafe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
</style>

</head>

<body>

<div class="container">
<div class="row justify-content-center">
<div class="col-md-5">

<div class="card shadow-lg border-0 rounded-4">

<div class="card-body p-4">

<h3 class="text-center mb-4 text-success">
🌾 Update Crop Price
</h3>

<div class="alert alert-light text-center border">
Current Price: <strong class="text-success">₹ {{ crop.price }} </strong>
</div>

<form method="POST">

<div class="mb-3">
<label class="form-label fw-semibold">New Price (Min-Max per 100 kg)</label>
<input type="text" 
class="form-control form-control-lg" 
name="price" 
value="{{ crop.price }}" 
placeholder="Enter new crop price"
required>
</div>

<div class="d-grid">
<button type="submit" class="btn btn-success btn-lg">
Update Price
</button>
</div>

</form>

<div class="text-center mt-3">
<a href="{{ url_for('buyer_dashboard') }}" class="btn btn-outline-secondary">
← Back to Dashboard
</a>
</div>

</div>
</div>

</div>
</div>
</div>

</body>
</html>
