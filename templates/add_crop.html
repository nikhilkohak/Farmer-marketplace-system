<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Crop Price</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #34495e;
        }

        select,
        input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        select:focus,
        input:focus {
            border-color: #27ae60;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 15px;
            margin-top: 10px;
        }

        .btn-primary {
            background: #27ae60;
            color: white;
        }

        .btn-primary:hover {
            background: #219150;
        }

        .btn-secondary {
            background: #7f8c8d;
            color: white;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #636e72;
        }

        .back-link {
            text-align: center;
        }

        @media (max-width: 500px) {
            .card {
                margin: 15px;
            }
        }
    </style>
</head>

<body>

<div class="card">

    <h2>🌾 Add Crop Price</h2>

    <form method="POST">

        <div class="form-group">
            <label>Select Crop</label>
            <select name="crop_id" required>
                {% for crop in crops %}
                    <option value="{{ crop.id }}">{{ crop.crop_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Price (Min-Max)</label>
            <input type="text" name="price" placeholder="1000-1200" required>
        </div>

        <button type="submit" class="btn btn-primary">Add Crop Price</button>

    </form>

    <div class="back-link">
        <a href="{{ url_for('buyer_dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
    </div>

</div>

</body>
</html>
